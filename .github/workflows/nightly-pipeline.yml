name: Nightly NCAAB pipeline

on:
  schedule:
    # Run at 08:00 UTC daily (~3:00am US Eastern)
    - cron: "0 8 * * *"
  workflow_dispatch: {}

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
      KENPOM_API_KEY: ${{ secrets.KENPOM_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        working-directory: apps/web
        run: |
          python -m pip install --upgrade pip
          python -m pip install polars requests beautifulsoup4

      - name: Run NCAAB pipeline (ratings → odds → join → merge)
        working-directory: apps/web
        run: |
          python run_pipeline.py

      - name: Export upcoming NCAAM games for writeups
        working-directory: apps/web
        run: |
          python src/export_upcoming_games.py

      - name: Commit updated processed data (if any)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/data/processed || true
          if ! git diff --cached --quiet; then
            git commit -m "Nightly NCAAB pipeline data refresh"
            git push
          else
            echo "No changes to commit."
          fi

